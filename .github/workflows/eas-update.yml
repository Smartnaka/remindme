name: EAS Update

on:

  push:

    branches:

      - main

jobs:

  eas-update:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository

        uses: actions/checkout@v4

      - name: Set up Node.js

        uses: actions/setup-node@v4

        with:

          node-version: 20

      - name: Install dependencies

        run: npm ci

      - name: Set up Expo and run EAS Update

        uses: expo/expo-github-action@v8

        with:

          eas-version: latest

          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update

        run: eas update --branch preview --channel preview --message "OTA update" --non-interactive
